  <g font-family="Inter, Arial, Helvetica, sans-serif" fill="#080b16">
    <text x="104" y="246" font-size="156" font-weight="850" letter-spacing="-10">Expert<tspan fill="#5847ed">OS</tspan></text>
    <text x="108" y="392" font-size="74" font-weight="760" letter-spacing="-3">Put expert know-how</text>
    <text x="108" y="480" font-size="74" font-weight="760" letter-spacing="-3">to work in your AI.</text>
    <text x="112" y="608" font-size="30" font-weight="560" fill="#313a57">Reviewed methods. Clear sources. Agent-native payment.</text>
    <text x="112" y="797" font-size="25" font-weight="700" letter-spacing="1.5" fill="#5847ed">TRYEXPERTOS.COM</text>

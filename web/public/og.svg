  </defs>
  <rect width="1734" height="907" fill="url(#background)"/>
  <rect x="42" y="54" width="1650" height="798" fill="url(#grid)" stroke="#14287a" stroke-opacity=".24" stroke-width="2"/>

  <g stroke="#263ecb" stroke-width="2" fill="none" opacity=".72">
    <path d="M18 54h210M42 26v210M1506 54h210M1692 26v210M18 852h210M42 724v156M1506 852h210M1692 724v156"/>
    <path d="M28 54h28M42 40v28M1678 54h28M1692 40v28M28 852h28M42 838v28M1678 852h28M1692 838v28" stroke-width="5"/>

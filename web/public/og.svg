<svg xmlns="http://www.w3.org/2000/svg" width="1734" height="907" viewBox="0 0 1734 907" role="img" aria-labelledby="title desc">
  <title id="title">ExpertOS — Expert Skills for AI Agents</title>
  <desc id="desc">Put expert know-how to work in your AI.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dfeeff"/>
      <stop offset="1" stop-color="#c8ddf6"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d5dfc"/>
      <stop offset="1" stop-color="#2235c9"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-50%" width="160%" height="220%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#1b2f8e" flood-opacity=".26"/>
    </filter>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#14287a" stroke-opacity=".08" stroke-width="1"/>
